title: Suspicious PowerShell Execution
id: d1000000-0000-4000-8000-000000000002
status: test
description: Detects encoded or hidden PowerShell command execution patterns.
author: Inso SIEM
date: 2026-04-21
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    process.name: powershell.exe
    process.command_line|contains:
      - -enc
      - -encodedcommand
      - -w hidden
  condition: selection
falsepositives:
  - Administrative scripts
  - Endpoint management tooling
level: high
tags:
  - attack.execution
  - attack.t1059.001
